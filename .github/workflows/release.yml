name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.7.0)'
        required: true
        default: 'v1.7.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            cmd: electron:build:win
          - os: macos-latest
            cmd: electron:build:mac
          - os: ubuntu-latest
            cmd: electron:build:linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Fix distutils for node-gyp (macOS)
        if: runner.os == 'macOS'
        run: pip3 install setuptools --break-system-packages

      - name: Fix distutils for node-gyp (Windows)
        if: runner.os == 'Windows'
        run: pip install setuptools

      - name: Fix distutils for node-gyp (Linux)
        if: runner.os == 'Linux'
        run: pip3 install setuptools

      - name: Generate runtime env for packaged app
        shell: bash
        run: |
          cat > config/runtime.env <<EOF
          # Generated by GitHub Actions during release build
          VERCEL_OAUTH_CLIENT_ID=${VERCEL_OAUTH_CLIENT_ID}
          VERCEL_OAUTH_CLIENT_SECRET=${VERCEL_OAUTH_CLIENT_SECRET}
          EOF
        env:
          VERCEL_OAUTH_CLIENT_ID: ${{ secrets.VERCEL_OAUTH_CLIENT_ID }}
          VERCEL_OAUTH_CLIENT_SECRET: ${{ secrets.VERCEL_OAUTH_CLIENT_SECRET }}

      - name: Build
        run: npm run ${{ matrix.cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_OAUTH_CLIENT_ID: ${{ secrets.VERCEL_OAUTH_CLIENT_ID }}
          VERCEL_OAUTH_CLIENT_SECRET: ${{ secrets.VERCEL_OAUTH_CLIENT_SECRET }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist-electron/*.exe
            dist-electron/*.exe.blockmap
            dist-electron/*.dmg
            dist-electron/*.dmg.blockmap
            dist-electron/*.zip
            dist-electron/*.zip.blockmap
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/latest*.yml

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -30 || ls -R artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
