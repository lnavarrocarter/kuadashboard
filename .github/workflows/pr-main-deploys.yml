name: Ordered PR deploys

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read
  projects: write

concurrency:
  group: pr-main-deploys-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test

  docs:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build VitePress docs
        working-directory: docs
        run: npm run build

  electron:
    needs: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Fix distutils for node-gyp (Linux)
        run: pip3 install setuptools

      - name: Generate icons
        run: npm run icons:generate

      - name: Generate runtime env for packaged app
        shell: bash
        run: |
          cat > config/runtime.env <<EOF
          # Generated by GitHub Actions for deploy validation
          VERCEL_OAUTH_CLIENT_ID=${VERCEL_OAUTH_CLIENT_ID}
          VERCEL_OAUTH_CLIENT_SECRET=${VERCEL_OAUTH_CLIENT_SECRET}
          EOF
        env:
          VERCEL_OAUTH_CLIENT_ID: ${{ secrets.VERCEL_OAUTH_CLIENT_ID }}
          VERCEL_OAUTH_CLIENT_SECRET: ${{ secrets.VERCEL_OAUTH_CLIENT_SECRET }}

      - name: Build Electron Linux package
        shell: bash
        run: |
          if [[ -z "${CSC_LINK}" ]]; then
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER APPLE_TEAM_ID
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npm run electron:build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_OAUTH_CLIENT_ID: ${{ secrets.VERCEL_OAUTH_CLIENT_ID }}
          VERCEL_OAUTH_CLIENT_SECRET: ${{ secrets.VERCEL_OAUTH_CLIENT_SECRET }}
          ELECTRON_BUILDER_PUBLISH: never
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' && 'true' || 'false' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Post-implementation health check
        shell: bash
        run: |
          PORT=7199 npm start >/tmp/kuadashboard-health.log 2>&1 &
          server_pid=$!
          trap 'kill ${server_pid}' EXIT

          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:7199/api/health" >/tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 2
          done

          cat /tmp/kuadashboard-health.log
          exit 1

  report_failure:
    needs: [tests, docs, electron]
    if: always() && (needs.tests.result == 'failure' || needs.docs.result == 'failure' || needs.electron.result == 'failure') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub issue for the failing deploy
        uses: actions/github-script@v7
        env:
          # Set this secret to the GitHub Project V2 ID to auto-add the issue to that board.
          PROJECT_V2_ID: ${{ secrets.DEPLOYMENT_PROJECT_V2_ID }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const prNumber = context.payload.pull_request?.number;
            const jobResults = {
              tests: '${{ needs.tests.result }}',
              docs: '${{ needs.docs.result }}',
              electron: '${{ needs.electron.result }}',
            };

            const failingJobs = Object.entries(jobResults)
              .filter(([, result]) => result !== 'success')
              .map(([name, result]) => `${name}: ${result}`)
              .join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy validation failed${prNumber ? ` for PR #${prNumber}` : ''}`,
              body: [
                `The ordered deploy pipeline failed and needs follow-up.`,
                '',
                `- Workflow run: ${runUrl}`,
                `- Commit: ${context.sha}`,
                prNumber ? `- Pull request: #${prNumber}` : null,
                '',
                'Failed stages:',
                failingJobs || '- unknown',
              ].filter(Boolean).join('\n'),
            });

            if (process.env.PROJECT_V2_ID) {
              await github.graphql(
                `mutation($projectId: ID!, $issueId: ID!) {
                  addProjectV2ItemById(input: { projectId: $projectId, contentId: $issueId }) {
                    item { id }
                  }
                }`,
                {
                  projectId: process.env.PROJECT_V2_ID,
                  issueId: issue.data.node_id,
                }
              );
            }
