name: Build & Release Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact-glob: '*.exe'
          - os: macos-latest
            platform: mac
            artifact-glob: '*.dmg'
          - os: ubuntu-latest
            platform: linux
            artifact-glob: '*.{AppImage,deb}'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild --force --types prod,optional
        env:
          npm_config_build_from_source: true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate icons
        run: npm run icons:generate

      - name: Build Electron app
        run: npm run electron:build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_PUBLISH: never

      - name: List build output
        run: ls dist-electron/
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KuaDashboard-${{ matrix.platform }}
          path: |
            dist-electron/${{ matrix.artifact-glob }}
            dist-electron/latest*.yml
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: KuaDashboard-win
          path: artifacts/win

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: KuaDashboard-mac
          path: artifacts/mac

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: KuaDashboard-linux
          path: artifacts/linux

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: KuaDashboard ${{ steps.version.outputs.tag }}
          draft: ${{ github.event.inputs.draft || 'false' }}
          generate_release_notes: true
          files: |
            artifacts/win/*.exe
            artifacts/mac/*.dmg
            artifacts/linux/*.AppImage
            artifacts/linux/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
