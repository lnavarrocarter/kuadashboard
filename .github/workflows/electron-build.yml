name: Build & Release Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact-glob: '*.exe'
          - os: macos-latest
            platform: mac
            artifact-glob: '*.dmg'
          - os: ubuntu-latest
            platform: linux
            artifact-glob: '*.{AppImage,deb}'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Fix distutils for node-gyp (macOS)
        if: runner.os == 'macOS'
        run: pip3 install setuptools --break-system-packages

      - name: Fix distutils for node-gyp (Windows)
        if: runner.os == 'Windows'
        run: pip install setuptools

      - name: Fix distutils for node-gyp (Linux)
        if: runner.os == 'Linux'
        run: pip3 install setuptools

      - name: Generate icons
        run: npm run icons:generate

      - name: Build Electron app
        run: npm run electron:build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_PUBLISH: never
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: true
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: List build output
        run: ls dist-electron/
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KuaDashboard-${{ matrix.platform }}
          path: |
            dist-electron/${{ matrix.artifact-glob }}
            dist-electron/*.zip
            dist-electron/latest*.yml
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: KuaDashboard-win
          path: artifacts/win

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: KuaDashboard-mac
          path: artifacts/mac

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: KuaDashboard-linux
          path: artifacts/linux

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.deb" -o -name "latest*.yml" \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            artifacts/win/*
            artifacts/mac/*
            artifacts/linux/*
            artifacts/SHA256SUMS.txt
          push-to-registry: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: KuaDashboard ${{ steps.version.outputs.tag }}
          draft: ${{ github.event.inputs.draft || 'false' }}
          generate_release_notes: true
          files: |
            artifacts/win/*.exe
            artifacts/mac/*.dmg
            artifacts/mac/*.zip
            artifacts/linux/*.AppImage
            artifacts/linux/*.deb
            artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
